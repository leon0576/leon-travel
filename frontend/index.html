                const select = document.getElementById(`participant-select-${day}`);
                if (select) {
                    select.innerHTML = '<option value="">选择当日参与人</option>';
                    
                    // 获取参与人列表的优先级：
                    // 1. 如果有总行程的参与人（从隐藏字段或trips数组），使用总行程的参与人
                    // 2. 否则使用所有可用的用户复选框
                    let allParticipants = [...tripParticipants];
                    
                    if (allParticipants.length === 0) {
                        const checkboxes = document.querySelectorAll('input[name="participant"]');
                        checkboxes.forEach(cb => {
                            if (cb.value && !allParticipants.includes(cb.value)) {
                                allParticipants.push(cb.value);
                            }
                        });
                    }
                    
                    // 添加参与人选项
                    allParticipants.forEach(participant => {
                        const option = document.createElement('option');
                        option.value = participant;
                        option.text = participant;
                        select.appendChild(option);
                    });
                }
                
                // 初始化地图自动完成
                initAutoComplete(day);
            }, 100);
        }
        
        // 初始化自动完成功能 - 使用PlaceSearch + 自定义下拉列表
        function initAutoComplete(day) {
            const startInput = document.getElementById(`start-input-${day}`);
            const endInput = document.getElementById(`end-input-${day}`);
            
            if (!startInput || !endInput) return;
            
            // 创建自定义下拉容器
            const startDropdown = createDropdownContainer();
            const endDropdown = createDropdownContainer();
            
            startInput.parentNode.appendChild(startDropdown);
            endInput.parentNode.appendChild(endDropdown);
            
            // 起点输入监听
            let startTimeout;
            startInput.addEventListener('input', function() {
                clearTimeout(startTimeout);
                startTimeout = setTimeout(() => {
                    searchKeyword(this.value, startDropdown, (name, location) => {
                        this.value = name;
                        startInput._location = location;
                    });
                }, 300);
            });
            
            // 终点输入监听
            let endTimeout;
            endInput.addEventListener('input', function() {
                clearTimeout(endTimeout);
                endTimeout = setTimeout(() => {
                    searchKeyword(this.value, endDropdown, (name, location) => {
                        this.value = name;
                        endInput._location = location;
                    });
                }, 300);
            });
            
            // 点击其他地方关闭下拉
            document.addEventListener('click', function(e) {
                if (!startInput.contains(e.target) && !startDropdown.contains(e.target)) {
                    startDropdown.style.display = 'none';
                }
                if (!endInput.contains(e.target) && !endDropdown.contains(e.target)) {
                    endDropdown.style.display = 'none';
                }
            });
        }
        
        // 创建下拉容器
        function createDropdownContainer() {
            const container = document.createElement('div');
            container.className = 'autocomplete-dropdown';
            container.style.cssText = `
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                max-height: 200px;
                overflow-y: auto;
                background: white;
                border: 1px solid #ddd;

            if (!keyword || keyword.length < 2) {

                return;
            }
            
            ensureAmapLoaded().then((loaded) => {
                if (!loaded) {
                    dropdown.style.display = 'none';
                    return;
                }
                AMap.plugin('AMap.PlaceSearch', function() {
                const placeSearch = new AMap.PlaceSearch({
                    pageSize: 8,
                    pageIndex: 1,
                    city: '全国',
                    panel: null
                });
                
                placeSearch.search(keyword, function(status, result) {
                    if (status === 'complete' && result.poiList && result.poiList.pois) {
                        showDropdown(result.poiList.pois, dropdown, callback);
                    } else {
                        dropdown.style.display = 'none';
                    }
                });
            });

        // 显示下拉列表
        function showDropdown(pois, dropdown, callback) {
            dropdown.innerHTML = '';
            
            if (pois.length === 0) {
                dropdown.style.display = 'none';
                return;
            }
            
            pois.forEach(poi => {
                const item = document.createElement('div');
                item.style.cssText = `
                    padding: 10px 12px;
                    cursor: pointer;
                    border-bottom: 1px solid #eee;
                    font-size: 14px;
                    color: #333;
                    background: white;
                `;
                item.textContent = poi.name + (poi.address ? ' - ' + poi.address : '');
                
                item.addEventListener('click', function() {
                    callback(poi.name, poi.location);
                    dropdown.style.display = 'none';
                });
                
                item.addEventListener('mouseenter', function() {
                    this.style.backgroundColor = '#f5f5f5';
                });
                
                item.addEventListener('mouseleave', function() {
                    this.style.backgroundColor = 'white';
                });
                
                dropdown.appendChild(item);
            });
            
            dropdown.style.display = 'block';
        }

            const participant = selectedOption.value;
            const container = document.querySelector(`.participants-day-container-${day}`);
            const hiddenInput = document.getElementById(`day-participants-${day}`);
            
            let participants = hiddenInput.value ? hiddenInput.value.split(',').filter(p => p) : [];

        // 计算行程天数
        function calculateTripDays() {
            const startDate = document.getElementById('trip-start-date').value;
            const endDate = document.getElementById('trip-end-date').value;
            
            if (startDate && endDate) {
                const days = calculateDays(startDate, endDate);
                document.getElementById('trip-days').textContent = days;
                
                // 更新每日计划的日期
                const container = document.getElementById('daily-plans-container');
                const start = new Date(startDate);
                
                Array.from(container.children).forEach((el, index) => {
                    const dateInput = el.querySelector(`[name="day-${index + 1}-date"]`);
                    if (!dateInput.value) { // 只有在用户未手动设置时才自动更新
                        const date = new Date(start);
                        date.setDate(date.getDate() + index);
                        dateInput.value = date.toISOString().split('T')[0];
                    }
                });
            }
        }

        function calculateDays(start, end) {
            const startDate = new Date(start);
            const endDate = new Date(end);
            const diffTime = Math.abs(endDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
            return diffDays;
        }

        // 上传文件函数 - 上传到 uploads 目录（用于头像和封面图片）
        async function uploadFile(file) {
            try {
                // 创建 FormData
                const formData = new FormData();
                formData.append('image', file);
                
                // 发送文件上传请求
                const token = localStorage.getItem('token');
                const uploadResponse = await fetch(`${API_BASE_URL}/upload`, {
                    method: 'POST',
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {},
                    body: formData
                });
                
                if (!uploadResponse.ok) {
                    throw new Error(`Upload failed: ${uploadResponse.status}`);
                }
                
                return await uploadResponse.json();
            } catch (error) {
                console.error('File upload error:', error);
                throw error;
            }
        }

            startY: 0,
            originalScale: 1

        // 打开头像裁剪器
        function openAvatarCropper(file) {
            if (!file || !file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('avatar-cropper-image');
                img.src = e.target.result;
                
                img.onload = function() {
                    // 先显示模态框，确保容器尺寸已经计算
                    document.getElementById('avatar-cropper-modal').classList.remove('hidden');
                    
                    // 等待一小段时间，确保容器尺寸已经计算完成
                    setTimeout(() => {
                        const containerSize = 256;
                        const imgWidth = img.naturalWidth;
                        const imgHeight = img.naturalHeight;
                        
                        // 计算初始缩放比例，使图片适应容器
                        const fitScale = containerSize / Math.max(imgWidth, imgHeight);
                        
                        // 初始化裁剪状态 - 图片居中
                        cropperState = {
                            image: img,
                            x: containerSize / 2,
                            y: containerSize / 2,
                            scale: fitScale,
                            isDragging: false,
                            startX: 0,
                            startY: 0,
                            originalScale: fitScale
                        };
                        
                        updateCropperImage();
                    }, 100);
                };
            };
            reader.readAsDataURL(file);
        }
        
        // 更新裁剪图片样式
        function updateCropperImage() {
            const img = cropperState.image;
            if (!img) return;
            
            img.style.left = cropperState.x + 'px';
            img.style.top = cropperState.y + 'px';
            img.style.transform = `translate(-50%, -50%) scale(${cropperState.scale})`;
        }
        
        // 缩放函数
        function zoomCropper(delta) {
            if (!cropperState) {
                return;
            }
            if (!cropperState.image) {
                return;
            }
            const newScale = cropperState.scale * (1 + delta);
            if (newScale >= 0.05 && newScale <= 10) {
                cropperState.scale = newScale;
                updateCropperImage();
            }
        }
        
        // 裁剪器鼠标按下
        function onCropperMouseDown(e) {
            e.preventDefault();
            cropperState.isDragging = true;
            cropperState.startX = e.clientX;
            cropperState.startY = e.clientY;
            document.getElementById('avatar-cropper-image').style.cursor = 'grabbing';
        }

        // 裁剪器触摸开始
        function onCropperTouchStart(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                cropperState.isDragging = true;
                cropperState.startX = e.touches[0].clientX;
                cropperState.startY = e.touches[0].clientY;
            }
        }

        // 裁剪器鼠标移动
        function onCropperMouseMove(e) {
            if (!cropperState.isDragging) return;

            const deltaX = e.clientX - cropperState.startX;
            const deltaY = e.clientY - cropperState.startY;

        // 确认裁剪
        function confirmAvatarCrop() {
            const img = cropperState.image;
            if (!img) return;

            // 创建canvas进行裁剪
            const canvas = document.createElement('canvas');
            const size = 256; // 输出头像大小
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            // 预览显示逻辑：
            // img.style.left = cropperState.x + 'px';
            // img.style.top = cropperState.y + 'px';
            // img.style.transform = `translate(-50%, -50%) scale(${cropperState.scale})`;
            // 图片中心在 (cropperState.x, cropperState.y)

            // 图片在容器中显示的尺寸
            const displayScale = cropperState.scale;
            const displayWidth = img.naturalWidth * displayScale;
            const displayHeight = img.naturalHeight * displayScale;

            // 容器中心(128,128)在图片上的位置
            // 因为图片中心在(cropperState.x, cropperState.y)
            // 所以容器中心的图片坐标 = (cropperState.x, cropperState.y)
            // 裁剪区域应该以这个点为中心，大小为 256/scale
            const cropCenterX = cropperState.x;
            const cropCenterY = cropperState.y;

            // 转换为图片实际像素坐标
            // 裁剪框从 (cropCenterX - 128, cropCenterY - 128) 到 (cropCenterX + 128, cropCenterY + 128)
            // 但这是容器坐标，需要转换为图片坐标
            // 图片坐标 = 容器坐标 / scale（假设图片以容器原点为中心缩放）
            // 不对，让我们重新思考...

            // 让我用简单的方式：
            // 预览时，图片的transform-origin是中心
            // 图片的(0,0)点（中心）显示在容器的(cropperState.x, cropperState.y)
            // 所以容器坐标(cx, cy)对应的图片坐标是：
            // imgX = (cx - cropperState.x) / scale + img.naturalWidth / 2
            // imgY = (cy - cropperState.y) / scale + img.naturalHeight / 2

            const imgCenterX = img.naturalWidth / 2;
            const imgCenterY = img.naturalHeight / 2;

            // 容器中心(128,128)对应的图片像素坐标
            const pointX = (size / 2 - cropperState.x) / displayScale + imgCenterX;
            const pointY = (size / 2 - cropperState.y) / displayScale + imgCenterY;

            // 裁剪区域：以这个点为中心，大小为 size/scale
            const cropX = pointX - size / 2 / displayScale;
            const cropY = pointY - size / 2 / displayScale;

            // 绘制圆形头像
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();

            // 绘制图片
            ctx.drawImage(
                img,
                cropX,
                cropY,
                size / displayScale,
                size / displayScale,
                0,
                0,
                size,
                size
            );
            
            // 获取裁剪后的数据URL
            const croppedDataUrl = canvas.toDataURL('image/png');

            // 更新表单预览和关闭裁剪器
            document.getElementById('avatar-cropper-modal').classList.add('hidden');

            // 将裁剪结果存入对应的隐藏字段和预览
            if (document.getElementById('profile-avatar').value !== undefined) {
                document.getElementById('profile-avatar').value = croppedDataUrl;
                document.getElementById('avatar-preview').src = croppedDataUrl;
            }
            if (document.getElementById('user-avatar').value !== undefined) {
                document.getElementById('user-avatar').value = croppedDataUrl;
                document.getElementById('user-avatar-preview').src = croppedDataUrl;
            }

            showToast('头像已裁剪完成');
        }

            } catch (error) {
                console.error('Error updating profile:', error);
                showToast('更新失败：' + error.message, 'error');
            }
        }
        
        // 更新设置按钮显示状态
        function updateSettingsButton() {
            const settingsBtn = document.getElementById('settings-btn');
            if (currentUser && currentUser.username === 'admin') {
                settingsBtn.classList.remove('hidden');
            } else {
                settingsBtn.classList.add('hidden');
            }
        }
        
        // 高德地图相关函数
        let maps = {};
        
        // 初始化地图
        function initMap(day) {
            if (!maps[day]) {
                const container = document.getElementById(`map-container-${day}`);
                if (container) {
                    maps[day] = new AMap.Map(`map-container-${day}`, {
                        zoom: 12,
                        center: [116.397428, 39.90923], // 默认北京
                        resizeEnable: true
                    });
                }
            }
            return maps[day];
        }
        
        // 查找路线
        async function searchRoute(day) {
            debugLog('Searching route for day:', day);
            
            // 尝试多种选择器方式
            const startInput = document.querySelector(`[name="day-${day}-start"]`);
            const endInput = document.querySelector(`[name="day-${day}-end"]`);
            
            debugLog('Start input element:', startInput);
            debugLog('End input element:', endInput);
            
            if (!startInput || !endInput) {
                console.error('Input elements not found for day:', day);
                showToast('无法找到输入元素', 'error');
                return;
            }
            
            const start = startInput.value;
            const end = endInput.value;
            
            debugLog('Start value:', start);
            debugLog('End value:', end);
            
            if (!start || !end) {
                showToast('请输入起点和终点', 'error');
                return;
            }
            
            const loaded = await ensureAmapLoaded();
            if (!loaded) return;
            const map = initMap(day);
            const routeInfo = document.getElementById(`route-info-${day}`);
            
            routeInfo.textContent = '正在查找路线...';
            
            // 地理编码起点
            AMap.plugin('AMap.Geocoder', function() {
                const geocoder = new AMap.Geocoder();
                
                geocoder.getLocation(start, function(status, result) {
                    if (status === 'complete' && result.geocodes.length > 0) {
                        const startLngLat = result.geocodes[0].location;
                        
                        // 地理编码终点
                        geocoder.getLocation(end, function(status, result) {
                            if (status === 'complete' && result.geocodes.length > 0) {
                                const endLngLat = result.geocodes[0].location;
                                
                                // 清除之前的路线
                                map.clearMap();
                                
                                // 添加标记
                                new AMap.Marker({
                                    position: startLngLat,
                                    map: map,
                                    title: '起点'
                                });
                                
                                new AMap.Marker({
                                    position: endLngLat,
                                    map: map,
                                    title: '终点'
                                });
                                
                                // 调整地图视野
                                map.setFitView();
                                
                                // 规划路线
                                AMap.plugin('AMap.Driving', function() {
                                    const driving = new AMap.Driving({
                                        map: map,
                                        panel: null,
                                        policy: AMap.DrivingPolicy.LEAST_TIME
                                    });
                                    
                                    driving.search([
                                        {keyword: start},
                                        {keyword: end}
                                    ], function(status, result) {
                                        if (status === 'complete') {
                                            if (result.routes && result.routes.length > 0) {
                                                const route = result.routes[0];
                                                routeInfo.innerHTML = `
                                                    <div class="flex justify-between gap-8">
                                                        <span>距离：${(route.distance / 1000).toFixed(1)} 公里</span>
                                                        <span>预计时间：${Math.round(route.time / 60)} 分钟</span>
                                                    </div>
                                                `;
                                            }
                                        } else {
                                            console.error('Driving search error:', status, result);
                                            routeInfo.textContent = '路线规划失败，可能是API密钥问题或网络错误';
                                        }
                                    });
                                });
                            } else {
                                console.error('Geocoder error (end):', status, result);
                                routeInfo.textContent = '终点位置解析失败';
                            }
                        });
                    } else {
                        console.error('Geocoder error (start):', status, result);
                        routeInfo.textContent = '起点位置解析失败';
                    }
                });
            });
        }
        
        // 初始化行程详情页的地图（使用动态地图）
        function initDetailMap(tripId, day, start, end) {
            return new Promise((resolve) => {
                setTimeout(async () => {
                    const loaded = await ensureAmapLoaded();
                    if (!loaded) {
                        resolve();
                        return;
                    }
                    const mapContainer = document.getElementById(`detail-map-${tripId}-${day}`);
                    if (!mapContainer) {
                        console.error(`Map container not found: detail-map-${tripId}-${day}`);
                        resolve();
                        return;
                    }
                    
                    const infoDiv = mapContainer.nextElementSibling;
                    if (infoDiv) {
                        infoDiv.innerHTML = '<div class="text-xs text-muted-text-color">正在加载地图...</div>';
                    }
                    
                    try {
                        const map = new AMap.Map(`detail-map-${tripId}-${day}`, {
                            zoom: 12,
                            center: [116.397428, 39.90923],
                            resizeEnable: true
                        });
                        
                        AMap.plugin('AMap.Geocoder', function() {
                            const geocoder = new AMap.Geocoder();
                            
                            geocoder.getLocation(start, function(status, result) {
                                if (status === 'complete' && result.geocodes.length > 0) {
                                    const startLngLat = result.geocodes[0].location;
                                    
                                    geocoder.getLocation(end, function(status, result) {
                                        if (status === 'complete' && result.geocodes.length > 0) {
                                            const endLngLat = result.geocodes[0].location;
                                            
                                            map.clearMap();
                                            
                                            new AMap.Marker({
                                                position: startLngLat,
                                                map: map,
                                                title: '起点'
                                            });
                                            
                                            new AMap.Marker({
                                                position: endLngLat,
                                                map: map,
                                                title: '终点'
                                            });
                                            
                                            map.setFitView();
                                            
                                            // 保存坐标信息到data属性，导出PDF时生成静态地图使用
                                            mapContainer.dataset.startLng = startLngLat.lng;
                                            mapContainer.dataset.startLat = startLngLat.lat;
                                            mapContainer.dataset.endLng = endLngLat.lng;
                                            mapContainer.dataset.endLat = endLngLat.lat;
                                            mapContainer.dataset.startName = start;
                                            mapContainer.dataset.endName = end;
                                            
                                            AMap.plugin('AMap.Driving', function() {
                                                const driving = new AMap.Driving({
                                                    map: map,
                                                    panel: null,
                                                    policy: AMap.DrivingPolicy.LEAST_TIME
                                                });
                                                
                                                driving.search([
                                                    { keyword: start },
                                                    { keyword: end }
                                                ], function(status, result) {
                                                    if (status === 'complete') {
                                                        if (result.routes && result.routes.length > 0) {
                                                            const route = result.routes[0];
                                                            const hours = (route.time / 60 / 60).toFixed(1);
                                                            if (infoDiv) {
                                                                infoDiv.innerHTML = `
                                                                    <div class="flex justify-between text-xs text-muted-text-color w-full">
                                                                        <span>距离：${(route.distance / 1000).toFixed(1)} 公里</span>
                                                                        <span>预计时间：${hours} 小时</span>
                                                                    </div>
                                                                `;
                                                            }
                                                        } else {
                                                            if (infoDiv) {
                                                                infoDiv.innerHTML = '<div class="text-xs text-red-500">未找到路线</div>';
                                                            }
                                                        }
                                                    } else {
                                                        console.error('Driving search error:', status, result);
                                                        if (infoDiv) {
                                                            infoDiv.innerHTML = '<div class="text-xs text-red-500">路线规划失败</div>';
                                                        }
                                                    }
                                                    resolve();
                                                });
                                            });
                                        } else {
                                            console.error('Geocoder error (end):', status, result);
                                            if (infoDiv) {
                                                infoDiv.innerHTML = '<div class="text-xs text-red-500">终点位置解析失败</div>';
                                            }
                                            resolve();
                                        }
                                    });
                                } else {
                                    console.error('Geocoder error (start):', status, result);
                                    if (infoDiv) {
                                        infoDiv.innerHTML = '<div class="text-xs text-red-500">起点位置解析失败</div>';
                                    }
                                    resolve();
                                }
                            });
                        });
                    } catch (error) {
                        console.error('Map initialization error:', error);
                        if (infoDiv) {
                            infoDiv.innerHTML = '<div class="text-xs text-red-500">地图加载失败</div>';
                        }
                        resolve();
                    }
                }, 300);
            });
        }
        
        // 获取起点和终点坐标（用于移动端）
        function getCoordinates(start, end) {
            return new Promise(async (resolve) => {
                const loaded = await ensureAmapLoaded();
                if (!loaded) {
                    resolve(null);
                    return;
                }
                // 超时机制
                const timeout = setTimeout(() => {
                    console.warn('getCoordinates timeout');
                    resolve(null);
                }, 8000); // 8秒超时
                
                try {
                    AMap.plugin('AMap.Geocoder', function() {
                        try {
                            const geocoder = new AMap.Geocoder();
                            
                            geocoder.getLocation(start, function(status, result) {
                                if (status === 'complete' && result.geocodes.length > 0) {
                                    const startLngLat = result.geocodes[0].location;
                                    
                                    geocoder.getLocation(end, function(status, result) {
                                        if (status === 'complete' && result.geocodes.length > 0) {
                                            const endLngLat = result.geocodes[0].location;
                                            clearTimeout(timeout);
                                            resolve({
                                                startLng: startLngLat.lng,
                                                startLat: startLngLat.lat,
                                                endLng: endLngLat.lng,
                                                endLat: endLngLat.lat
                                            });
                                        } else {
                                            console.error('Geocoder error (end):', status, result);
                                            clearTimeout(timeout);
                                            resolve(null);
                                        }
                                    });
                                } else {
                                    console.error('Geocoder error (start):', status, result);
                                    clearTimeout(timeout);
                                    resolve(null);
                                }
                            });
                        } catch (err) {
                            console.error('Geocoder error:', err);
                            clearTimeout(timeout);
                            resolve(null);
                        }
                    });
                } catch (err) {
                    console.error('AMap.plugin error:', err);
                    clearTimeout(timeout);
                    resolve(null);
                }
            });
        }
        
        // 获取静态地图URL和路线信息（距离、时间）
        function getStaticMapAndRouteInfo(startLngLat, endLngLat, startName, endName) {
            return new Promise(async (resolve) => {
                const loaded = await ensureAmapLoaded();
                const restKey = getAmapRestKey();
                if (!loaded || !restKey) {
                    if (!restKey) showToast('请先在设置中填写高德 REST Key', 'error');
                    resolve({ staticMapUrl: null, distance: null, duration: null });
                    return;
                }
                AMap.plugin('AMap.Driving', function() {
                    const driving = new AMap.Driving({
                        panel: null,
                        policy: AMap.DrivingPolicy.LEAST_TIME
                    });
                    
                    driving.search(
                        new AMap.LngLat(startLngLat.lng, startLngLat.lat),
                        new AMap.LngLat(endLngLat.lng, endLngLat.lat),
                        function(status, result) {
                            let pathCoords = `${startLngLat.lng},${startLngLat.lat}`;
                            let distance = null;
                            let duration = null;
                            
                            if (status === 'complete' && result.routes && result.routes.length > 0) {
                                const route = result.routes[0];
                                
                                // 保存距离和时间
                                distance = route.distance;
                                duration = route.time;
                                
                                // 收集所有路径坐标
                                const allPathPoints = [];
                                
                                if (route.steps && route.steps.length > 0) {
                                    for (const step of route.steps) {
                                        if (step.path && step.path.length > 0) {
                                            for (const point of step.path) {
                                                allPathPoints.push(point);
                                            }
                                        }
                                    }
                                }
                                
                                // 间隔取点，避免URL过长
                                let pointCount = 0;
                                const maxPoints = 100; // 最多100个点
                                
                                if (allPathPoints.length > 0) {
                                    const interval = Math.max(1, Math.floor(allPathPoints.length / maxPoints));
                                    
                                    for (let i = 0; i < allPathPoints.length; i += interval) {
                                        pathCoords += `;${allPathPoints[i].lng},${allPathPoints[i].lat}`;
                                        pointCount++;
                                        if (pointCount >= maxPoints - 1) break;
                                    }
                                }
                                
                                // 添加终点
                                pathCoords += `;${endLngLat.lng},${endLngLat.lat}`;
                            } else {
                                // 如果路线规划失败，使用直线
                                pathCoords += `;${endLngLat.lng},${endLngLat.lat}`;
                                console.error('Driving search error:', status, result);
                            }
                            
                            // 构建静态地图URL
                            const startMarker = encodeURIComponent('起');
                            const endMarker = encodeURIComponent('终');
                            const staticMapUrl = `https://restapi.amap.com/v3/staticmap?size=1024*300&markers=mid,0x00FF00,${startMarker}:${startLngLat.lng},${startLngLat.lat}|mid,0xFF0000,${endMarker}:${endLngLat.lng},${endLngLat.lat}&paths=5,0x0000FF,1,,:${pathCoords}&key=${encodeURIComponent(restKey)}`;
                            
                            resolve({ staticMapUrl, distance, duration });
                        }
                    );
                });
            });
        }
        
        // 生成静态地图URL（严格按照当前版本代码逻辑）
        function generateStaticMapUrl(startLngLat, endLngLat, startName, endName) {
            return new Promise(async (resolve) => {
                const info = await getStaticMapAndRouteInfo(startLngLat, endLngLat, startName, endName);
                resolve(info.staticMapUrl);
            });
        }
        

    </script>
