<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 idiots - 行程规划</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --primary-color: #4f46e5;
            --secondary-color: #ec4899;
            --background-color: #f3f4f6;
            --card-background: #ffffff;
            --text-color: #1f2937;
            --muted-text-color: #6b7280;
        }
        .dark {
            --primary-color: #6366f1;
            --secondary-color: #f472b6;
            --background-color: #111827;
            --card-background: #1f2937;
            --text-color: #f9fafb;
            --muted-text-color: #9ca3af;
        }
        body {
            background-color: var(--background-color);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
        }
        #background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
            transition: opacity 0.3s;
        }
        #background-overlay.glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .dark #background-overlay.glass {
            background: rgba(0, 0, 0, 0.2);
        }
        .card {
            background-color: var(--card-background);
            transition: background-color 0.3s;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            opacity: 0.9;
        }
        .btn-secondary {
            background-color: var(--secondary-color);
            color: white;
            transition: background-color 0.3s;
        }
        .btn-secondary:hover {
            opacity: 0.9;
        }
        .input-field {
            background-color: var(--card-background);
            color: var(--text-color);
            border: 1px solid var(--muted-text-color);
        }
        .input-field::placeholder {
            color: var(--muted-text-color);
        }
        [data-lucide] {
            stroke: #000000;
        }
        .dark [data-lucide] {
            stroke: #ffffff;
        }
        /* 背景图片优化 - 确保在高分辨率屏幕上清晰显示 */
        #background-overlay,
        #login-background-overlay {
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.5);
        }
        .dark .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.8);
        }
        .hidden {
            display: none !important;
        }
        #trip-modal.hidden,
        #trip-detail-modal.hidden,
        #expense-modal.hidden,
        #settings-modal.hidden,
        #user-modal.hidden,
        #profile-modal.hidden,
        #password-modal.hidden,
        #avatar-cropper-modal.hidden,
        #delete-confirm-modal.hidden {
            display: none !important;
        }
        #main-app.hidden {
            display: none !important;
        }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            background-color: #10b981;
            color: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.3s, transform 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        #avatar-cropper-container {
            position: relative;
            width: 256px;
            height: 256px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
            cursor: move;
        }
        #avatar-cropper-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
            pointer-events: none;
            z-index: 10;
        }
        #avatar-cropper-image {
            position: absolute;
            max-width: none;
            cursor: move;
        }
        
        /* 封面裁剪器样式 */
        #cover-cropper-container {
            position: relative;
            width: 600px;
            height: 0;
            padding-bottom: 56.25%; /* 16:9比例 */
            margin: 0 auto;
            overflow: hidden;
            border: 2px dashed #ccc;
            cursor: move;
        }
        
        /* 响应式设计 - 手机端 */
        @media (max-width: 768px) {
            #cover-cropper-container {
                width: 100%;
                height: 0;
                padding-bottom: 56.25%; /* 16:9比例 */
                max-width: 400px;
            }
            
            /* 调整模态框大小 */
            #cover-cropper-modal > div {
                margin: 10px;
                max-width: calc(100% - 20px);
            }
        }
        
        #cover-cropper-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px dashed #ccc;
            pointer-events: none;
            z-index: 10;
        }
        
        #cover-cropper-image {
            position: absolute;
            max-width: none;
            cursor: move;
        }
        
        /* 背景图片裁剪器样式 */
        #background-cropper-container {
            position: relative;
            width: 600px;
            height: 338px; /* 16:9比例 */
            margin: 0 auto;
            overflow: hidden;
            border: 2px dashed #ccc;
            cursor: move;
        }
        
        #background-cropper-container::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px dashed #ccc;
            pointer-events: none;
            z-index: 10;
        }
        
        #background-cropper-image {
            position: absolute;
            max-width: none;
            cursor: move;
        }
    </style>
</head>
<body class="font-sans">
    <div id="app" class="min-h-screen">
        <div id="background-overlay"></div>
        <!-- 登录页面 -->
        <div id="login-page" class="relative flex items-center justify-center min-h-screen p-4">
            <div id="login-background-overlay" class="absolute inset-0 -z-10 bg-cover bg-center bg-no-repeat"></div>
            <div class="w-full max-w-md card p-8 rounded-lg shadow-lg opacity-80">
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold text-primary-color">3 idiots - 行程规划</h1>
                    <p class="text-muted-text-color mt-4 text-xs italic">无论阳光和小狗，还是晚风和啤酒，本质都是爱和自由。</p>
                </div>
                <div id="login-form-container">
                    <form id="login-form" class="space-y-6">
                        <div>
                            <label for="username" class="block text-sm font-medium text-muted-text-color mb-1">用户名</label>
                            <input type="text" id="username" name="username" class="input-field w-full px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-color" placeholder="请输入用户名" required>
                        </div>
                        <div>
                            <label for="password" class="block text-sm font-medium text-muted-text-color mb-1">密码</label>
                            <input type="password" id="password" name="password" class="input-field w-full px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-color" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn-primary w-full py-2 rounded-md font-semibold">登录</button>
                    </form>
                </div>
                
                <div id="init-form-container" class="hidden">
                    <div class="text-center mb-4">
                        <h2 class="text-xl font-semibold">初始化管理员账户</h2>
                        <p class="text-muted-text-color text-sm">请设置管理员用户名和密码</p>
                    </div>
                    <form id="init-form" class="space-y-6">
                        <div>
                            <label for="init-username" class="block text-sm font-medium text-muted-text-color mb-1">管理员用户名</label>
                            <input type="text" id="init-username" name="username" class="input-field w-full px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-color" placeholder="请输入管理员用户名" required>
                        </div>
                        <div>
                            <label for="init-password" class="block text-sm font-medium text-muted-text-color mb-1">密码</label>
                            <input type="password" id="init-password" name="password" class="input-field w-full px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-color" placeholder="请输入密码" required>
                        </div>
                        <div>
                            <label for="init-confirm-password" class="block text-sm font-medium text-muted-text-color mb-1">确认密码</label>
                            <input type="password" id="init-confirm-password" name="confirm-password" class="input-field w-full px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-color" placeholder="请再次输入密码" required>
                        </div>
                        <button type="submit" class="btn-primary w-full py-2 rounded-md font-semibold">创建管理员账户</button>
                    </form>
                </div>
            </div>
        </div>

        <!-- 主应用页面 -->
        <div id="main-app" class="hidden">
            <!-- 顶部导航栏 -->
            <nav class="card shadow-md p-4 px-2 sm:px-3 md:px-4 lg:px-6 flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <button type="button" class="btn-primary px-4 py-2 rounded-md" onclick="toggleTripModal()">
                        我们出发吧
                    </button>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="theme-toggle" class="p-2 text-xl">
                        <span id="theme-icon">☀️</span>
                    </button>
                    <button id="settings-btn" class="p-2 text-xl flex items-center justify-center">
                        ⚙️
                    </button>
                    <div id="user-profile" class="flex items-center space-x-2 cursor-pointer p-2" onclick="toggleUserProfileMenu()">
                        <img id="avatar" src="https://ui-avatars.com/api/?name=A&size=150&background=4f46e5&color=fff" alt="User Avatar" class="w-8 h-8 rounded-full">
                        <span id="user-name">Admin</span>
                    </div>
                    <!-- 用户个人资料菜单 -->
                    <div id="user-profile-menu" class="absolute right-2 sm:right-4 top-16 bg-white dark:bg-gray-800 text-gray-800 dark:text-white rounded-md shadow-lg p-2 w-44 sm:w-48 hidden z-50 border border-gray-200 dark:border-gray-700">
                        <button onclick="editUserProfile()" class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">
                            👤 修改个人信息
                        </button>
                        <button onclick="logout()" class="w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">
                            🚪 退出登录
                        </button>
                    </div>
                </div>
            </nav>

            <!-- 行程列表页面 -->
            <div id="trip-list-page" class="p-2 sm:p-3 md:p-4 lg:p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5 lg:gap-6">
                    <!-- 行程卡片将在这里动态生成 -->
                </div>
            </div>
        </div>

        <!-- 新增/编辑行程模态框 -->
        <div id="trip-modal" class="fixed inset-0 flex items-center justify-center z-50" style="display: none;">
            <div class="modal-backdrop absolute inset-0" onclick="toggleTripModal()"></div>
            <div class="card relative w-full max-w-4xl rounded-lg shadow-xl p-6 max-h-[90vh] overflow-y-auto">
                <button onclick="toggleTripModal()" class="absolute top-4 right-4 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <i data-lucide="x"></i>
                </button>
                <h2 id="modal-title" class="text-2xl font-bold mb-6">我们出发吧</h2>
                <form id="trip-form" class="space-y-6">
                    <input type="hidden" id="trip-id">
                    <input type="hidden" id="trip-participants">
                    <input type="hidden" id="trip-cover-data" name="coverData">
                    <div>
                        <label for="trip-cover" class="block text-sm font-medium text-muted-text-color mb-1">封面图片</label>
                        <input type="file" id="trip-cover" name="cover" class="input-field w-full px-4 py-2 rounded-md" accept="image/*">
                    </div>
                    <div>
                        <label for="trip-title" class="block text-sm font-medium text-muted-text-color mb-1">行程标题</label>
                        <input type="text" id="trip-title" name="title" class="input-field w-full px-4 py-2 rounded-md" placeholder="例如：2025 年云南 7 日游" required>
                    </div>
                    <div>
                        <label for="trip-description" class="block text-sm font-medium text-muted-text-color mb-1">行程描述</label>
                        <textarea id="trip-description" name="description" rows="3" class="input-field w-full px-4 py-2 rounded-md" placeholder="记录旅行的目的、亮点等信息"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="trip-transport" class="block text-sm font-medium text-muted-text-color mb-1">交通方式</label>
                            <input type="text" id="trip-transport" name="transport" class="input-field w-full px-4 py-2 rounded-md" placeholder="例如：飞机 + 自驾">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-muted-text-color mb-1">参与人</label>
                            <div id="participants-container" class="space-y-2">
                                <!-- 系统用户将在这里动态添加 -->
                                <div class="text-gray-400 text-sm">加载中...</div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="trip-start" class="block text-sm font-medium text-muted-text-color mb-1">起点</label>
                            <input type="text" id="trip-start" name="startLocation" class="input-field w-full px-4 py-2 rounded-md" placeholder="出发地点">
                        </div>
                        <div>
                            <label for="trip-end" class="block text-sm font-medium text-muted-text-color mb-1">终点</label>
                            <input type="text" id="trip-end" name="endLocation" class="input-field w-full px-4 py-2 rounded-md" placeholder="目的地">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label for="trip-start-date" class="block text-sm font-medium text-muted-text-color mb-1">开始日期</label>
                            <input type="date" id="trip-start-date" name="startDate" class="input-field w-full px-4 py-2 rounded-md" required>
                        </div>
                        <div>
                            <label for="trip-end-date" class="block text-sm font-medium text-muted-text-color mb-1">结束日期</label>
                            <input type="date" id="trip-end-date" name="endDate" class="input-field w-full px-4 py-2 rounded-md" required>
                        </div>
                    </div>
                    <div>
                        <p class="text-sm font-medium text-muted-text-color mb-1">行程总天数: <span id="trip-days">0</span> 天</p>
                    </div>
                    <div class="border-t pt-6">
                        <h3 class="text-xl font-semibold mb-4">行程详情规划</h3>
                        <div id="daily-plans-container">
                            <!-- 每日行程将在这里动态生成 -->
                        </div>
                        <button type="button" id="add-day-btn" class="btn-secondary mt-4 px-4 py-2 rounded-md flex items-center space-x-2">
                            <i data-lucide="plus"></i>
                            <span>添加一天</span>
                        </button>
                    </div>
                    <div class="flex justify-end space-x-4 pt-4">
                        <button type="button" onclick="toggleTripModal()" class="px-6 py-2 rounded-md border border-gray-300 dark:border-gray-600">取消</button>
                        <button type="submit" class="btn-primary px-6 py-2 rounded-md font-semibold">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- 行程详情模态框 -->
        <div id="trip-detail-modal" class="fixed inset-0 flex items-center justify-center z-50 hidden">
            <div class="modal-backdrop absolute inset-0" onclick="toggleTripDetailModal()"></div>
            <div class="card relative w-full max-w-4xl rounded-lg shadow-xl p-6 max-h-[90vh] overflow-y-auto">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold">行程详情</h2>
                    <div class="flex gap-2">
                        <button onclick="exportTripToPDF()" class="btn-secondary px-3 py-1 rounded text-sm">
                            导出 PDF
                        </button>
                        <button onclick="toggleTripDetailModal()" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                            <i data-lucide="x"></i>
                        </button>
                    </div>
                </div>
                <div id="trip-detail-content">
                    <!-- 行程详情将在这里动态生成 -->
                </div>
            </div>
        </div>

        <!-- 费用管理模态框 -->
        <div id="expense-modal" class="fixed inset-0 flex items-center justify-center z-50 hidden">
            <div class="modal-backdrop absolute inset-0" onclick="toggleExpenseModal()"></div>
            <div class="card relative w-full max-w-md rounded-lg shadow-xl p-6">
                <button onclick="toggleExpenseModal()" class="absolute top-4 right-4 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <i data-lucide="x"></i>
                </button>
                <h2 class="text-2xl font-bold mb-6">费用管理</h2>
                <div id="expense-modal-content">
                    <!-- 费用管理内容将在这里动态生成 -->
                </div>
            </div>
        </div>

        <!-- 设置模态框 -->
        <div id="settings-modal" class="fixed inset-0 flex items-center justify-center z-50 hidden">
            <div class="modal-backdrop absolute inset-0" onclick="toggleSettingsModal()"></div>
            <div class="card relative w-full max-w-md rounded-lg shadow-xl p-6 max-h-[90vh] overflow-y-auto">
                <button onclick="toggleSettingsModal()" class="absolute top-4 right-4 p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <i data-lucide="x"></i>
                </button>
                <h2 class="text-2xl font-bold mb-6">设置</h2>
                <div class="space-y-6">
                    <div>
                        <h3 class="text-lg font-semibold mb-4">用户管理</h3>
                        <button id="add-user-btn" class="btn-primary w-full py-2 rounded-md font-semibold mb-4">新增用户</button>
                        <div id="users-list" class="space-y-2">
                            <!-- 用户列表将在这里动态生成 -->
                        </div>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold mb-4">界面设置</h3>
                        <div class="flex items-center justify-between mb-4">
                            <span>深色模式</span>
                            <button id="theme-toggle-btn" class="relative inline-flex items-center h-6 rounded-full w-11 bg-gray-200 transition-colors focus:outline-none">
                                <span id="theme-toggle-dot" class="inline-block w-4 h-4 transform translate-x-1 bg-white rounded-full transition-transform"></span>
                            </button>
                        </div>

                        <div class="mt-4">
                            <label for="background-opacity" class="block text-sm font-medium text-muted-text-color mb-1">背景透明度：<span id="opacity-value">80</span>%</label>
                            <input type="range" id="background-opacity" name="backgroundOpacity" min="0" max="100" value="80" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" onchange="updateBackgroundOpacity(this.value)" oninput="document.getElementById('opacity-value').textContent = this.value">
                        </div>
                        <div class="flex items-center justify-between mt-4">
                            <span class="text-sm font-medium text-muted-text-color">磨玻璃效果</span>
                            <button type="button" id="glass-effect-btn" onclick="toggleGlassEffect()" class="relative inline-flex items-center h-6 rounded-full w-11 bg-gray-200 transition-colors focus:outline-none">
                                <span id="glass-effect-dot" class="inline-block w-4 h-4 transform translate-x-1 bg-white rounded-full transition-transform"></span>
                            </button>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <label for="background-image" class="block text-sm font-medium text-muted-text-color mb-1">背景图片</label>
                            <input type="file" id="background-image" name="background" class="input-field w-full px-4 py-2 rounded-md" accept="image/*">
                            <input type="hidden" id="background-data" name="backgroundData">
                            <button type="button" id="delete-background-btn" class="mt-2 text-sm text-red-500 hover:underline" onclick="deleteBackgroundImage()">删除背景图片</button>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <label for="login-background-image" class="block text-sm font-medium text-muted-text-color mb-1">登录界面背景图片</label>
                            <input type="file" id="login-background-image" name="loginBackground" class="input-field w-full px-4 py-2 rounded-md" accept="image/*">
                            <input type="hidden" id="login-background-data" name="loginBackgroundData">
                            <button type="button" id="delete-login-background-btn" class="mt-2 text-sm text-red-500 hover:underline" onclick="deleteLoginBackgroundImage()">删除登录界面背景图片</button>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                            <label for="amap-web-key" class="block text-sm font-medium text-muted-text-color mb-1">高德 JS API Key（Web端）</label>
                            <input type="password" id="amap-web-key" class="input-field w-full px-4 py-2 rounded-md" autocomplete="off" placeholder="用于页面动态地图、地点搜索等">
                            <label for="amap-security-code" class="block text-sm font-medium text-muted-text-color mb-1 mt-3">securityJsCode（JS API 安全密钥）</label>
                            <input type="password" id="amap-security-code" class="input-field w-full px-4 py-2 rounded-md" autocomplete="off" placeholder="可选：开启安全校验时填写">
                            <label for="amap-rest-key" class="block text-sm font-medium text-muted-text-color mb-1 mt-3">高德 Web服务 Key</label>

    <script>
        // API配置 - 使用相对路径，通过nginx反向代理
        const API_BASE_URL = '/api';
        const AMAP_WEB_KEY_STORAGE = 'amapWebKey';
        const AMAP_SECURITY_STORAGE = 'amapSecurityCode';
        const AMAP_REST_KEY_STORAGE = 'amapRestKey';
        const DEBUG_LOGS = localStorage.getItem('debugLogs') === 'true';
        let amapLoadPromise = null;

        function debugLog(...args) {
            if (DEBUG_LOGS) {
                console.log(...args);
            }
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function getAmapConfig() {
            return {
                webKey: localStorage.getItem(AMAP_WEB_KEY_STORAGE) || currentUser?.amapWebKey || '',
                securityCode: localStorage.getItem(AMAP_SECURITY_STORAGE) || currentUser?.amapSecurityCode || '',
                restKey: localStorage.getItem(AMAP_REST_KEY_STORAGE) || currentUser?.amapRestKey || ''
            };
        }

        function saveAmapConfigToLocal(config) {
            [
                [AMAP_WEB_KEY_STORAGE, config.amapWebKey],
                [AMAP_SECURITY_STORAGE, config.amapSecurityCode],
                [AMAP_REST_KEY_STORAGE, config.amapRestKey]
            ].forEach(([key, value]) => {
                if (value) {
                    localStorage.setItem(key, value);
                } else {
                    localStorage.removeItem(key);
                }
            });
        }

        function syncAmapSettingsInputs() {
            const config = getAmapConfig();
            const webKeyInput = document.getElementById('amap-web-key');
            const securityInput = document.getElementById('amap-security-code');
            const restKeyInput = document.getElementById('amap-rest-key');
            if (webKeyInput) webKeyInput.value = config.webKey;
            if (securityInput) securityInput.value = config.securityCode;
            if (restKeyInput) restKeyInput.value = config.restKey;
        }

        function getAmapRestKey() {
            return getAmapConfig().restKey || getAmapConfig().webKey;
        }

        async function ensureAmapLoaded() {
            if (window.AMap) return true;
            const config = getAmapConfig();
            if (!config.webKey) {
                showToast('请先在设置中填写高德 Web Key', 'error');
                return false;
            }
            if (config.securityCode) {
                window._AMapSecurityConfig = { securityJsCode: config.securityCode };
            }
            if (!amapLoadPromise) {
                amapLoadPromise = new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = `https://webapi.amap.com/maps?v=2.0&key=${encodeURIComponent(config.webKey)}`;
                    script.async = true;
                    script.onload = () => resolve(true);
                    script.onerror = () => {
                        amapLoadPromise = null;
                        showToast('高德地图加载失败，请检查 Key', 'error');
                        resolve(false);
                    };
                    document.head.appendChild(script);
                });
            }
            return amapLoadPromise;
        }

        function getAmapSettingsFormValues() {
            return {
                webKey: document.getElementById('amap-web-key')?.value.trim() || '',
                securityCode: document.getElementById('amap-security-code')?.value.trim() || '',
                restKey: document.getElementById('amap-rest-key')?.value.trim() || ''
            };
        }

        function setAmapValidationResult(message, type = 'info') {
            const result = document.getElementById('amap-validation-result');
            if (!result) return;
            result.textContent = message;
            result.className = `text-sm mt-2 ${
                type === 'success' ? 'text-green-500' :
                type === 'error' ? 'text-red-500' :
                'text-muted-text-color'
            }`;
        }

        async function validateAmapKeys() {
            const button = document.getElementById('validate-amap-key-btn');
            const token = localStorage.getItem('token');
            const values = getAmapSettingsFormValues();

            if (!values.webKey && !values.restKey) {
                setAmapValidationResult('请至少填写 JS API Key（Web端）或 Web服务 Key', 'error');
                return;
            }

            const previousText = button ? button.textContent : '';
            if (button) {
                button.disabled = true;
                button.textContent = '验证中...';
            }
            setAmapValidationResult('正在验证高德 Key...');

            const messages = [];
            let hasError = false;
            const oldConfig = {
                amapWebKey: localStorage.getItem(AMAP_WEB_KEY_STORAGE),
                amapSecurityCode: localStorage.getItem(AMAP_SECURITY_STORAGE),
                amapRestKey: localStorage.getItem(AMAP_REST_KEY_STORAGE)
            };

            try {
                if (values.webKey) {
                    saveAmapConfigToLocal({
                        amapWebKey: values.webKey,
                        amapSecurityCode: values.securityCode,
                        amapRestKey: values.restKey
                    });
                    amapLoadPromise = null;
                    const loaded = await ensureAmapLoaded();
                    if (loaded && window.AMap) {
                        messages.push('JS API Key 可加载地图 JS');
                    } else {
                        hasError = true;
                        messages.push('JS API Key 验证失败');
                    }
                }

                if (values.restKey) {
                    if (!token) {
                        hasError = true;
                        messages.push('Web服务 Key 需要登录后验证');
                    } else {
                    try {
                        const response = await apiCall('/amap/validate', 'POST', { restKey: values.restKey }, token);
                        messages.push(response.message || 'Web服务 Key 验证通过');
                    } catch (error) {
                        hasError = true;
                        if (String(error.message || '').includes('status: 404')) {
                            messages.push('Web服务 Key 验证接口未部署：请重建后端容器（docker compose up -d --build backend）');
                        } else if (String(error.message || '').includes('status: 401')) {
                            messages.push('Web服务 Key 验证失败：登录已失效，请重新登录');
                        } else {
                            messages.push(`Web服务 Key 验证失败：${error.message}`);
                        }
                    }
                    }
                }

                setAmapValidationResult(messages.join('；'), hasError ? 'error' : 'success');
            } finally {
                saveAmapConfigToLocal(oldConfig);
                if (button) {
                    button.disabled = false;
                    button.textContent = previousText;
                }
            }
        }
        
        // 统一处理图片URL的函数
        function getFullImageUrl(path) {
            if (!path) return 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=800&q=80'; // 防错处理
            
            // 如果是完整的http链接或Base64，直接返回
            if (path.startsWith('http') || path.startsWith('data:')) {
                return path;
            }
            
            // 关键修正：确保所有相对路径都加上/api前缀
            // 这里的path如果是 "1777...jpg"，处理后变为 "/api/uploads/1777...jpg"
            // 如果是背景图片，会在保存时特殊处理
            const fileName = path.split('/').pop();
            return `${API_BASE_URL}/uploads/${fileName}`;
        }
        
        // 模拟数据（仅用于初始显示）
        let trips = [
            {
                id: 1,
                cover: 'https://images.unsplash.com/photo-1500835556837-99ac94a94552?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D',
                title: '2025 年云南 7 日游',
                description: '探索云南的自然美景和民族文化',
                transport: '飞机 + 自驾',
                participants: '张三,李四',
                startLocation: '北京',
                endLocation: '昆明',
                attractions: '大理古城,洱海,玉龙雪山',
                startDate: '2025-02-01',
                endDate: '2025-02-07',
                days: 7,
                dailyPlans: [
                    {
                        day: 1,
                        route: '北京 - 昆明',
                        accommodation: '昆明希尔顿酒店',
                        dining: '云南过桥米线',
                        expenses: [
                            { category: '交通', amount: 1200, payer: '张三', split: true },
                            { category: '住宿', amount: 600, payer: '李四', split: true }
                        ],
                        participants: '张三,李四',
                        date: '2025-02-01',
                        transport: '飞机'
                    }
                ]
            }
        ];

        let users = [];

        let currentUser = null;
        let editingTripId = null;
        let editingUserId = null;
        let pendingDeleteCallback = null;
        let currentCroppingTarget = 'trip';

        // API调用函数
        async function apiCall(endpoint, method = 'GET', data = null, token = null) {
            const headers = {
                'Content-Type': 'application/json'
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }
            
            const options = {
                method,
                headers
            };
            
            if (data) {
                options.body = JSON.stringify(data);
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('API call error:', error);
                showToast(`API错误: ${error.message}`, 'error');
                throw error;
            }
        }

        // DOM 加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            initializeApp();
        });

        async function initializeApp() {
            // 检查本地存储的token
            const token = localStorage.getItem('token');
            const savedTheme = localStorage.getItem('theme');

            // 默认使用浅色模式
            if (savedTheme) {
                document.documentElement.classList.toggle('dark', savedTheme === 'dark');
            } else {
                // 没有保存的主题时，默认使用浅色模式
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }

            updateThemeToggle();

            // 安全的事件绑定函数
            function safeBind(id, event, handler) {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener(event, handler);
                }
            }

        async function saveTrip(tripData) {
            // 确保cover字段是字符串，不是空对象
            debugLog('saveTrip - tripData.cover:', tripData.cover);
            debugLog('saveTrip - editingTripId:', editingTripId);
            
            // 关键：检查必填项，防止 400 错误
            if (!tripData.title) {
                showToast('请填写行程标题', 'error');
                return;
            }
            
            if (!tripData.startDate) {
                showToast('请填写开始日期', 'error');
                return;
            }
            
            if (!tripData.endDate) {
                showToast('请填写结束日期', 'error');
                return;
            }
            
            if (!tripData.cover || typeof tripData.cover !== 'string' || tripData.cover === '[object Object]') {
                debugLog('saveTrip - cover is invalid, setting default');
                // 如果是编辑行程，保留原封面
                if (editingTripId) {
                    const originalTrip = trips.find(t => t.id === editingTripId);
                    if (originalTrip) {
                        tripData.cover = originalTrip.cover;
                    } else {
                        tripData.cover = 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D';
                    }
                } else {
                    // 新增行程，如果没有封面才设置默认封面
                    tripData.cover = 'https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D';
                }
            } else {
                debugLog('saveTrip - cover is valid, using it');
            }

            // 处理每日计划
            const dailyPlansContainer = document.getElementById('daily-plans-container');
            const dailyPlanElements = dailyPlansContainer.querySelectorAll('.daily-plan');
            const dailyPlans = [];

            dailyPlanElements.forEach((el, index) => {
                const day = index + 1;
                const start = el.querySelector(`[name="day-${day}-start"]`).value;
                const end = el.querySelector(`[name="day-${day}-end"]`).value;
                const accommodation = el.querySelector(`[name="day-${day}-accommodation"]`).value;
                const dining = el.querySelector(`[name="day-${day}-dining"]`).value;
                const participants = el.querySelector(`[name="day-${day}-participants"]`).value;
                const date = el.querySelector(`[name="day-${day}-date"]`).value;
                const transport = el.querySelector(`[name="day-${day}-transport"]`).value;
                const spotsInput = el.querySelector(`[name="day-${day}-spots"]`);
                const checkinSpots = spotsInput ? spotsInput.value.split(',').filter(s => s) : [];
                
                // 处理费用 - 如果是编辑行程，保留原有的费用数据
                let expenses = [];
                if (editingTripId) {
                    const originalTrip = trips.find(t => t.id === editingTripId);
                    if (originalTrip) {
                        const originalDailyPlan = originalTrip.dailyPlans.find(p => p.day === day);
                        if (originalDailyPlan && originalDailyPlan.expenses) {
                            expenses = originalDailyPlan.expenses;
                        }
                    }
                } else {
                    // 处理新增行程的费用
                    const expenseElements = el.querySelectorAll('.expense-item');
                    expenseElements.forEach(expEl => {
                        const category = expEl.querySelector(`[name="day-${day}-expense-category"]`).value;
                        const amount = parseFloat(expEl.querySelector(`[name="day-${day}-expense-amount"]`).value);
                        const payer = expEl.querySelector(`[name="day-${day}-expense-payer"]`).value;
                        const split = expEl.querySelector(`[name="day-${day}-expense-split"]`).checked;
                        
                        if (category && amount) {
                            expenses.push({ category, amount, payer, split });
                        }
                    });
                }

                dailyPlans.push({
                    day, start, end, accommodation, dining, participants, date, transport, checkinSpots, expenses
                });
            });

            tripData.dailyPlans = dailyPlans;
            tripData.days = calculateDays(tripData.startDate, tripData.endDate);

            try {
                const token = localStorage.getItem('token');
                let result;
                if (editingTripId) {
                    // 编辑现有行程
                    result = await apiCall(`/trips/${editingTripId}`, 'PUT', tripData, token);
                    showToast('行程更新成功！');
                } else {
                    // 新增行程
                    result = await apiCall('/trips', 'POST', tripData, token);
                    showToast('行程创建成功！');
                }
                
                if (result) {
                    if (!editingTripId) {
                        // 新建行程：确保把后端返回的带有正确 cover 路径的 result 加入数组
                        trips.unshift(result);
                    } else {
                        const index = trips.findIndex(t => t.id === editingTripId);
                        if (index !== -1) trips[index] = result;
                    }
                    renderTripList(); // 立即重新渲染
                    toggleTripModal();
                    // 保存行程后刷新页面
                    setTimeout(() => {
                        window.location.reload();
                    }, 100);
                } else {
                    await loadTrips();
                    toggleTripModal();
                    // 保存行程后刷新页面
                    setTimeout(() => {
                        window.location.reload();
                    }, 100);
                }
            } catch (error) {
                showToast('保存行程失败：' + error.message, 'error');
            }
        }

        // 处理用户提交
        async function handleUserSubmit(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const userData = Object.fromEntries(formData.entries());
            
            // 处理头像 - 首先检查裁剪后的头像数据
            const userAvatarValue = document.getElementById('user-avatar').value;
            if (userAvatarValue) {
                userData.avatar = userAvatarValue;
                await saveUser(userData);
            } else {
                // 检查是否选择了新文件
                const avatarInput = document.getElementById('user-avatar-select');
                if (avatarInput.files.length > 0) {
                    const reader = new FileReader();
                    reader.onload = async function(event) {
                        userData.avatar = event.target.result;
                        await saveUser(userData);
                    };
                    reader.readAsDataURL(avatarInput.files[0]);
                } else {
                    // 如果是编辑，保留原头像；如果是新增，使用默认头像
                    if (!editingUserId) {
                        userData.avatar = 'https://ui-avatars.com/api/?name=User&size=150&background=4f46e5&color=fff';
                    }
                    await saveUser(userData);
                }
            }
        }

        async function saveUser(userData) {
            // 确保avatar字段有效
            if (!userData.avatar || typeof userData.avatar !== 'string' || userData.avatar === '[object Object]') {
                if (editingUserId) {
                    const originalUser = users.find(u => u.id === editingUserId);
                    if (originalUser) {
                        userData.avatar = originalUser.avatar;
                    } else {
                        userData.avatar = 'https://ui-avatars.com/api/?name=User&size=150&background=4f46e5&color=fff';
                    }
                } else {
                    userData.avatar = 'https://ui-avatars.com/api/?name=User&size=150&background=4f46e5&color=fff';
                }
            }

            try {
                const token = localStorage.getItem('token');
                if (editingUserId) {
                    // 编辑现有用户
                    await apiCall(`/users/${editingUserId}`, 'PUT', userData, token);
                    
                    // 更新当前用户信息
                    if (currentUser && currentUser.id === editingUserId) {
                        currentUser = { ...currentUser, ...userData };
                        document.getElementById('user-name').textContent = currentUser.nickname;
                        document.getElementById('avatar').src = currentUser.avatar;
                    }
                    showToast('用户更新成功！');
                } else {
                    // 新增用户
                    await apiCall('/users', 'POST', userData, token);
                    showToast('用户创建成功！');
                }
                
                await loadUsers();
                toggleUserModal();
                // 保存用户信息后刷新页面
                setTimeout(() => {
                    window.location.reload();
                }, 100);
            } catch (error) {
                showToast('保存用户失败：' + error.message, 'error');
            }
        }

        // 模态框控制
        // 加载参与人复选框
        async function loadParticipants() {
            try {
                const token = localStorage.getItem('token');
                const users = await apiCall('/users', 'GET', null, token);
                
                const container = document.getElementById('participants-container');
                container.innerHTML = '';
                
                users.forEach(user => {
                    const checkboxDiv = document.createElement('div');
                    checkboxDiv.className = 'flex items-center';
                    checkboxDiv.innerHTML = `
                        <input type="checkbox" id="participant-${escapeHtml(user.id)}" name="participant" value="${escapeHtml(user.nickname)}" class="mr-2">
                        <label for="participant-${escapeHtml(user.id)}" class="text-sm">${escapeHtml(user.nickname)}</label>
                    `;
                    container.appendChild(checkboxDiv);
                });
            } catch (error) {
                console.error('Error loading participants:', error);
                const container = document.getElementById('participants-container');
                container.innerHTML = '<div class="text-red-500 text-sm">加载失败</div>';
            }

        function toggleTripModal() {
            debugLog('toggleTripModal called');
            debugLog('currentUser:', currentUser);
            
            const modal = document.getElementById('trip-modal');
            if (!modal) {
                debugLog('Trip modal not found');
                alert('Trip modal not found');
                return;
            }
            
            // 检查模态框当前状态
            const isVisible = modal.style.display === 'flex';
            
            // 如果模态框是可见的，直接隐藏
            if (isVisible) {
                modal.style.display = 'none';
                editingTripId = null;
                return;
            }
            
            // 只有管理员可以创建/编辑行程
            if (!currentUser) {
                debugLog('currentUser is null');
                showToast('请先登录', 'error');
                return;
            }
            if (currentUser.username !== 'admin') {
                debugLog('currentUser.username:', currentUser.username);
                showToast('只有管理员可以创建或编辑行程', 'error');
                return;
            }
            
            debugLog('Modal found, showing...');
            // 显示模态框
            modal.style.display = 'flex';
            debugLog('Modal set to visible');
            
            // 重置表单
            if (!editingTripId) {
                const tripForm = document.getElementById('trip-form');
                if (tripForm) tripForm.reset();
                const modalTitle = document.getElementById('modal-title');
                if (modalTitle) modalTitle.textContent = '我们出发吧';
                const dailyPlansContainer = document.getElementById('daily-plans-container');
                if (dailyPlansContainer) dailyPlansContainer.innerHTML = '';
                // 关键修复：清空图片临时数据
                document.getElementById('trip-cover-data').value = '';
                document.getElementById('trip-cover').value = '';
            }
            // 加载参与人
            loadParticipants();
            // 等待参与人加载完成后再添加每日行程
            setTimeout(() => {
                if (!editingTripId) {
                    addDailyPlan();
                }
            }, 100);
            
            try {
                if (typeof lucide !== 'undefined' && lucide.createIcons) {
                    lucide.createIcons();
                }

                debugLog('lucide.createIcons error:', e);

        // 切换行程详情模态框
        function toggleTripDetailModal() {
            const modal = document.getElementById('trip-detail-modal');
            modal.classList.toggle('hidden');
            // 当模态框关闭时，刷新页面
            if (modal.classList.contains('hidden')) {

        // 检测是否为移动端设备
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        }
        
        // 统计费用，按类别分组
        function collectExpensesByCategory(expenses) {
            const categoryTotals = {};
            expenses.forEach(exp => {
                const category = exp.category || '其他';
                categoryTotals[category] = (categoryTotals[category] || 0) + (exp.amount || 0);
            });
            return categoryTotals;
        }
        
        // 初始化费用统计饼图
        function initExpensePieChart(containerId, categoryTotals) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const categories = Object.keys(categoryTotals);
            if (categories.length === 0) {
                container.innerHTML = '<div class="flex items-center justify-center h-full text-muted-text-color">尚无费用产生</div>';
                return;
            }
            
            const isMobile = isMobileDevice();
            // 根据设备类型调整容器高度，移动端使用更大高度
            if (isMobile) {
                container.style.height = '320px';
            }
            
            const chart = echarts.init(container);
            
            // 准备数据，并按金额从高到低排序
            const data = categories.map(category => ({
                name: category,
                value: categoryTotals[category]
            })).sort((a, b) => b.value - a.value);
            
            // 根据设备类型设置不同的布局
            let legendConfig, centerConfig;
            if (isMobile) {
                // 移动端：图例在顶部，饼图在下方，增加间距
                legendConfig = {
                    orient: 'horizontal',
                    top: '10px', // 给图例留出顶部空间
                    padding: [0, 0, 30, 0], // 增加底部内边距，与饼图保持更大距离
                    textStyle: {
                        color: document.documentElement.classList.contains('dark') ? '#fff' : '#333',
                        fontSize: 12
                    }
                };
                centerConfig = ['50%', '65%']; // 饼图向下移动，给图例留出更多空间
            } else {
                // 桌面端：图例在左边，饼图在右边
                legendConfig = {
                    orient: 'vertical',
                    left: 'left',
                    textStyle: {
                        color: document.documentElement.classList.contains('dark') ? '#fff' : '#333'
                    }
                };
                centerConfig = ['50%', '50%'];
            }
            
            // 配置项
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}: {c}元 ({d}%)'
                },
                legend: legendConfig,
                series: [
                    {
                        name: '费用分布',
                        type: 'pie',
                        radius: isMobile ? ['35%', '60%'] : ['40%', '70%'], // 移动端稍微缩小一点饼图
                        center: centerConfig,
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: document.documentElement.classList.contains('dark') ? '#1f2937' : '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: true,
                            formatter: '{b}\n{c}元\n({d}%)',
                            fontSize: isMobile ? 11 : 12 // 移动端标签字体稍小
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 16,
                                fontWeight: 'bold'
                            }
                        },
                        data: data
                    }
                ]
            };
            
            chart.setOption(option);
            
            // 响应式
            window.addEventListener('resize', () => {
                chart.resize();
            });
            
            return chart;
        }

        // 初始化每日费用柱状图
        function initDailyExpenseBarChart(containerId, dailyPlans) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            const isDark = document.documentElement.classList.contains('dark');
            const isMobile = isMobileDevice();
            
            // 准备数据
            const dates = [];
            const splitExpenses = [];
            
            dailyPlans.forEach(plan => {
                if (plan.date) {
                    const date = new Date(plan.date);
                    const month = date.getMonth() + 1;
                    const day = date.getDate();
                    dates.push(`${month}-${day}`);
                } else {
                    dates.push(`第${plan.day}天`);
                }
                let daySplitTotal = 0;
                if (plan.expenses && plan.expenses.length > 0) {
                    plan.expenses.forEach(exp => {
                        if (exp.split) {
                            daySplitTotal += exp.amount || 0;
                        }
                    });
                }
                splitExpenses.push(daySplitTotal);
            });
            
            if (dates.length === 0) {
                container.innerHTML = '<div class="flex items-center justify-center h-full text-muted-text-color">暂无行程</div>';
                return;
            }
            
            const chart = echarts.init(container);
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'shadow'
                    },
                    formatter: function(params) {
                        return params[0].axisValue + '<br/>需分摊费用: ' + params[0].value + '元';
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLine: {
                        lineStyle: {
                            color: isDark ? '#4b5563' : '#d1d5db'
                        }
                    },
                    axisLabel: {
                        color: isDark ? '#d1d5db' : '#374151'
                    }
                },
                yAxis: {
                    type: 'value',
                    axisLine: {
                        lineStyle: {
                            color: isDark ? '#4b5563' : '#d1d5db'
                        }
                    },
                    axisLabel: {
                        color: isDark ? '#d1d5db' : '#374151',
                        formatter: '{value}元'
                    },
                    splitLine: {
                        lineStyle: {
                            color: isDark ? '#374151' : '#e5e7eb'
                        }
                    }
                },
                series: [
                    {
                        name: '需分摊费用',
                        type: 'bar',
                        data: splitExpenses.map((value, index) => ({
                            value: value,
                            itemStyle: {
                                color: ['#f59e0b', '#10b981', '#8b5cf6'][index % 3]
                            }
                        })),
                        barWidth: isMobile ? '50%' : '60%'
                    }
                ]
            };
            
            chart.setOption(option);
            
            window.addEventListener('resize', () => {
                chart.resize();
            });
            
            return chart;
        }

        // 显示行程详情
        function showTripDetail(id) {
            const trip = trips.find(t => t.id === id);

            // 计算费用

            const allExpenses = []; // 收集所有费用，用于统计
            const participants = trip.participants.split(',').filter(p => p.trim());
            participants.forEach(p => {
                participantPayments[p.trim()] = 0;
                participantSplitPayments[p.trim()] = 0;
            });

            trip.dailyPlans.forEach(plan => {
                if (plan.expenses && plan.expenses.length > 0) {
                    plan.expenses.forEach(exp => {
                        totalExpense += exp.amount || 0;
                        // 只统计勾选了分摊的费用

                            allExpenses.push(exp);
                            splitExpense += exp.amount || 0;
                            // 只记录分摊费用的支付

            if (titleElement) {
                tripTitle = titleElement.textContent.trim();
            }
            
            // 生成当前日期，格式为YYYYMMDD
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const formattedDate = `${year}${month}${day}`;
            
            // 生成文件名：行程标题-行程详情-导出日期
            const filename = `${tripTitle}-行程详情-${formattedDate}.pdf`;
            
            // 找到限制高度的所有父容器
            let currentElement = element;
            const containers = [];
            const originalStyles = [];
            
            // 向上查找并保存所有可能限制高度的容器
            while (currentElement && currentElement !== document.body) {
                const computedStyle = window.getComputedStyle(currentElement);
                if (computedStyle.maxHeight !== 'none' || 
                    computedStyle.overflow === 'auto' || 
                    computedStyle.overflow === 'scroll' ||
                    computedStyle.overflowY === 'auto' ||
                    computedStyle.overflowY === 'scroll') {
                    containers.push(currentElement);
                    originalStyles.push({
                        maxHeight: currentElement.style.maxHeight,
                        overflow: currentElement.style.overflow,
                        overflowY: currentElement.style.overflowY,
                        height: currentElement.style.height
                    });
                }
                currentElement = currentElement.parentElement;
            }
            
            debugLog('找到的容器数量:', containers.length);
            
            // 检测是否为移动端设备
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            debugLog('是否为移动端:', isMobile);
            
            // 根据设备类型设置等待时间（静态地图加载快）
            const waitTime = isMobile ? 1000 : 500; // 移动端1秒，桌面端0.5秒
            debugLog('等待时间:', waitTime, 'ms');
            
            try {
                // 临时解除所有高度限制，让内容完全展开
                containers.forEach(container => {
                    container.style.maxHeight = 'none';
                    container.style.overflow = 'visible';
                    container.style.overflowY = 'visible';
                    container.style.height = 'auto';
                });
                
                // 等待浏览器重绘，确保内容完全展开（地图加载需要时间）
                debugLog(`等待 ${waitTime}ms 让地图完全加载...`);
                await new Promise(resolve => setTimeout(resolve, waitTime));
                
                // 关键：克隆一个节点，防止修改原UI
                const clone = element.cloneNode(true);
                // 设置固定宽度，适配导出
                clone.style.width = '800px';
                clone.style.maxWidth = '100%';
                clone.style.padding = '20px';
                clone.style.margin = '0';
                // 移除可能的居中类
                clone.classList.remove('mx-auto', 'mx-auto', 'justify-center', 'items-center');
                clone.style.textAlign = 'left';
                
                // 先将克隆节点添加到文档中

                // 移动端优化：先找到所有原容器中的 base64 图片
                const originalMapContainers = element.querySelectorAll('[id^="detail-map-"]');
                const base64MapCache = {};
                if (isMobile) {
                    originalMapContainers.forEach(container => {
                        const id = container.id;
                        if (container.dataset.base64Map) {
                            base64MapCache[id] = container.dataset.base64Map;
                            debugLog(`找到缓存的静态地图: ${id}`);
                        }
                    });
                }
                
                // 串行处理每张地图，一张一张来
                for (let i = 0; i < mapContainers.length; i++) {
                    const container = mapContainers[i];
                    const containerId = container.id;
                    
                    if (container.dataset.startLng && container.dataset.endLng) {
                        // 移动端优先用缓存的 base64 图片
                        if (isMobile && base64MapCache[containerId]) {
                            debugLog(`直接使用缓存的第 ${i + 1}/${mapContainers.length} 张静态地图...`);
                            const base64Url = base64MapCache[containerId];
                            
                            // 创建图片

                            img.style.width = '100%';
                            img.style.height = 'auto';

                            container.innerHTML = '';

                            container.appendChild(img);
                            
                            debugLog(`第 ${i + 1}/${mapContainers.length} 张静态地图（缓存）处理完成`);
                            continue; // 跳过下面的重新生成逻辑
                        }
                        
                        debugLog(`正在处理第 ${i + 1}/${mapContainers.length} 张静态地图...`);
                        
                        const startLngLat = {
                            lng: parseFloat(container.dataset.startLng),
                            lat: parseFloat(container.dataset.startLat)
                        };
                        const endLngLat = {
                            lng: parseFloat(container.dataset.endLng),
                            lat: parseFloat(container.dataset.endLat)
                        };
                        const startName = container.dataset.startName || '';

                        try {

                                throw new Error('缺少高德地图 Key');

                            // 使用fetch获取图片并转换为base64
                            const response = await fetch(staticMapUrl);
                            const blob = await response.blob();
                            const base64Url = await new Promise((resolve, reject) => {
                                const reader = new FileReader();
                                reader.onloadend = () => resolve(reader.result);
                                reader.onerror = reject;
                                reader.readAsDataURL(blob);
                            });
                            
                            // 创建最终显示的图片
                            const img = document.createElement('img');
                            img.src = base64Url;
                            img.style.width = '100%';
                            img.style.height = 'auto'; // 保持原始宽高比

                            img.alt = `${startName}到${endName}的路线图`;
                            
                            // 清空容器并添加图片
                            container.innerHTML = '';
                            container.style.height = 'auto'; // 让容器适应图片高度
                            container.appendChild(img);
                            
                            debugLog(`第 ${i + 1}/${mapContainers.length} 张静态地图处理完成`);
                        } catch (err) {
                            console.error(`处理第 ${i + 1}/${mapContainers.length} 张静态地图失败:`, err);
                            // 失败则尝试直接显示
                            try {

                                }

                                img.style.width = '100%';
                                img.style.height = 'auto';
                                img.style.display = 'block';
                                img.style.borderRadius = '4px';
                                container.innerHTML = '';
                                container.style.height = 'auto';
                                container.appendChild(img);

                        // 如果不是最后一张地图，等待0.5秒再处理下一张

                        }
                    }

                debugLog('所有静态地图处理完成');

        // 保存费用
        async function saveExpenses() {
            debugLog('saveExpenses called');
            const tripId = parseInt(document.getElementById('expense-trip-id').value);
            const day = parseInt(document.getElementById('expense-day').value);
            debugLog('tripId:', tripId, 'day:', day);
            
            const trip = trips.find(t => t.id === tripId);
            if (!trip) {
                debugLog('Trip not found');
                return;
            }
            debugLog('Trip found:', trip.title);

            const dailyPlan = trip.dailyPlans.find(p => p.day === day);
            if (!dailyPlan) {
                debugLog('Daily plan not found');
                return;
            }
            debugLog('Daily plan found:', day);

            const expenseItems = document.querySelectorAll('.expense-item');
            debugLog('expenseItems count:', expenseItems.length);
            const expenses = [];

            expenseItems.forEach(item => {
                const category = item.querySelector('.expense-category').value;
                const amount = parseFloat(item.querySelector('.expense-amount').value);
                const payer = item.querySelector('.expense-payer').value;
                const split = item.querySelector('.expense-split').checked;

                debugLog('Processing expense:', { category, amount, payer, split });

                if (category && amount && payer) {
                    expenses.push({ category, amount, payer, split });
                }
            });

            debugLog('Final expenses:', expenses);
            dailyPlan.expenses = expenses;

            try {
                const token = localStorage.getItem('token');
                debugLog('Sending PUT request to /trips/' + tripId);
                await apiCall(`/trips/${tripId}`, 'PUT', trip, token);
                // 更新trips全局变量中的对应行程
                const tripIndex = trips.findIndex(t => t.id === tripId);
                if (tripIndex !== -1) {
                    trips[tripIndex] = trip;
                }
                showToast('费用保存成功！');
                toggleExpenseModal();
                // 不重新打开行程详情模态框，保持在当前页面
            } catch (error) {
                console.error('Save failed:', error);
                showToast('保存失败：' + error.message, 'error');
            }
        }

        // 添加每日计划
        function addDailyPlan(plan = null) {
            const container = document.getElementById('daily-plans-container');
            const day = container.children.length + 1;
            const startDate = document.getElementById('trip-start-date').value;
            
            let planDate = startDate;
            if (startDate) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + day - 1);
                planDate = date.toISOString().split('T')[0];
            }

            const existingSpots = plan?.checkinSpots || [];
            const spotsTagsHtml = existingSpots.map((spot, idx) => 
                `<span class="inline-flex items-center px-2 py-1 rounded-full text-sm bg-green-100 dark:bg-green-900 text-green-800 dark:text-green-200">
                    ${escapeHtml(spot)}
                    <button type="button" onclick="removeSpot(this, ${idx})" class="ml-1 hover:text-red-600">×</button>
                </span>`
            ).join('');

            // 获取总行程的参与人列表
            let tripParticipants = [];
            const hiddenParticipants = document.getElementById('trip-participants')?.value;
            if (hiddenParticipants) {
                tripParticipants = hiddenParticipants.split(',').filter(p => p.trim());
            } else if (editingTripId) {
                const trip = trips.find(t => t.id === editingTripId);
                if (trip && trip.participants) {
                    tripParticipants = trip.participants.split(',').filter(p => p.trim());
                }
            } else {
                // 新增行程时，从复选框中获取总行程参与人
                const checkboxes = document.querySelectorAll('input[name="participant"]:checked');
                checkboxes.forEach(cb => {
                    if (cb.value && !tripParticipants.includes(cb.value)) {
                        tripParticipants.push(cb.value);
                    }
                });
            }
            
            // 如果是新增每日行程（plan为null），且有总行程的参与人，则默认添加所有参与人
            // 如果是编辑行程（plan存在），但该每日行程没有参与人，则使用行程的参与人作为默认值
            const planParticipants = plan?.participants ? plan.participants.split(',').filter(p => p) : [];
            const existingParticipants = planParticipants.length > 0 ? planParticipants : (tripParticipants.length > 0 ? tripParticipants : []);
            const participantsTagsHtml = existingParticipants.map((p, idx) => 
                `<span class="inline-flex items-center px-2 py-1 rounded-full text-sm bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200">
                    ${escapeHtml(p)}
                    <button type="button" onclick="removeDayParticipant(this, ${idx})" class="ml-1 hover:text-red-600">×</button>

            dailyPlan.innerHTML = `

                    <h4 class="text-lg font-semibold">Day ${day}</h4>
                    <button onclick="removeDailyPlan(this)" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div class="relative">
                        <label class="block text-sm font-medium text-muted-text-color mb-1">起点</label>
                        <input type="text" id="start-input-${day}" name="day-${day}-start" class="input-field w-full px-4 py-2 rounded-md" value="${escapeHtml(plan?.start || '')}" placeholder="出发地点">
                    </div>
                    <div class="relative">
                        <label class="block text-sm font-medium text-muted-text-color mb-1">终点</label>
                        <input type="text" id="end-input-${day}" name="day-${day}-end" class="input-field w-full px-4 py-2 rounded-md" value="${escapeHtml(plan?.end || '')}" placeholder="目的地点">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-muted-text-color mb-1">住宿</label>
                        <input type="text" name="day-${day}-accommodation" class="input-field w-full px-4 py-2 rounded-md" value="${escapeHtml(plan?.accommodation || '')}">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-muted-text-color mb-1">用餐</label>
                        <input type="text" name="day-${day}-dining" class="input-field w-full px-4 py-2 rounded-md" value="${escapeHtml(plan?.dining || '')}">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-muted-text-color mb-1">交通方式</label>
                        <input type="text" name="day-${day}-transport" class="input-field w-full px-4 py-2 rounded-md" value="${escapeHtml(plan?.transport || '')}">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-muted-text-color mb-1">日期</label>
                        <input type="date" name="day-${day}-date" class="input-field w-full px-4 py-2 rounded-md" value="${escapeHtml(plan?.date || planDate)}">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-muted-text-color mb-1">当日参与人</label>
                        <div class="participants-day-container-${day} flex flex-wrap gap-2 mb-2">
                            ${participantsTagsHtml}
                        </div>
                        <select name="day-${day}-participant-select" id="participant-select-${day}" class="input-field w-full px-4 py-2 rounded-md" onchange="addDayParticipant(${day})">
                            <option value="">选择当日参与人</option>

                    <label class="block text-sm font-medium text-muted-text-color mb-1">推荐打卡点</label>
                    <div class="spots-container-${day} flex flex-wrap gap-2 mb-2">
                        ${spotsTagsHtml}
                    </div>
                    <input type="text" id="spot-input-${day}" class="input-field w-full px-4 py-2 rounded-md" placeholder="输入打卡点后按回车添加" onkeypress="handleSpotInput(event, ${day})">
                    <input type="hidden" name="day-${day}-spots" id="spots-${day}" value="${existingSpots.join(',')}">
                </div>
                <!-- 地图和路线信息 -->
                <div class="mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <label class="block text-sm font-medium text-muted-text-color">路线规划</label>

                    </div>
                    <div id="map-container-${day}" class="w-full h-64 border rounded-md mb-2"></div>
                    <div id="route-info-${day}" class="text-sm text-muted-text-color">
                        请输入起点和终点并点击"查找路线"
                    </div>
